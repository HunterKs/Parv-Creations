<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - Parv Creations Admin</title>
    <link rel="stylesheet" href="/admin/css/style.css">
    <link rel="stylesheet" href="/admin/css/theme.css">
    <link rel="stylesheet" href="/admin/css/table.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1 class="logo">Parv Creations Admin</h1>
                <nav class="header-nav">
                    <button id="theme-toggle" class="btn-theme">Toggle Theme</button>
                    <div class="user-info">
                        <span id="username">Admin User</span>
                        <button id="logout-btn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </header>

            <div class="dashboard-body">
                <aside class="sidebar">
                    <nav class="sidebar-nav">
                        <ul>
                            <li><a href="/admin/users/" class="nav-link active">Users</a></li>
                            <li><a href="/admin/roles/" class="nav-link">Roles</a></li>
                        </ul>
                    </nav>
                </aside>

                <main class="main-content">
                    <div class="page-header">
                        <h2>Users Management</h2>
                        <div class="actions">
                            <a href="/admin/users/edit.html" class="btn btn-success">Add New User</a>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="data-table" id="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Last Login</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Table rows will be populated by JavaScript -->
                                <tr>
                                    <td colspan="8" class="text-center">Loading users...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="/admin/js/theme.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/notification.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/users.js"></script>
</body>
</html>
