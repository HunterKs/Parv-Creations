<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Parv Creations Admin</title>
    <link rel="stylesheet" href="/admin/css/style.css">
    <link rel="stylesheet" href="/admin/css/theme.css">
    <link rel="stylesheet" href="/admin/css/form.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1 class="logo">Parv Creations Admin</h1>
                <nav class="header-nav">
                    <button id="theme-toggle" class="btn-theme">Toggle Theme</button>
                    <div class="user-info">
                        <span id="username">Admin User</span>
                        <button id="logout-btn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </header>

            <div class="dashboard-body">
                <aside class="sidebar">
                    <nav class="sidebar-nav">
                        <ul>
                            <li><a href="/admin/users/" class="nav-link">Users</a></li>
                            <li><a href="/admin/roles/" class="nav-link">Roles</a></li>
                        </ul>
                    </nav>
                </aside>

                <main class="main-content">
                    <div class="page-header">
                        <h2 id="page-title">Edit User</h2>
                        <a href="/admin/users/" class="btn btn-secondary btn-back">← Back to Users</a>
                    </div>

                    <form id="user-form" class="validation-form">
                        <input type="hidden" id="user-id">
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="first-name">First Name <span class="required">*</span></label>
                                <input type="text" id="first-name" name="first_name" required>
                                <div class="invalid-feedback">
                                    Please enter a first name
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="last-name">Last Name <span class="required">*</span></label>
                                <input type="text" id="last-name" name="last_name" required>
                                <div class="invalid-feedback">
                                    Please enter a last name
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address <span class="required">*</span></label>
                            <input type="email" id="email" name="email" required>
                            <div class="invalid-feedback">
                                Please enter a valid email address
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="role">Role <span class="required">*</span></label>
                            <select id="role" name="role_id" required>
                                <!-- Roles will be populated by JavaScript -->
                                <option value="">Select a role</option>
                            </select>
                            <div class="invalid-feedback">
                                Please select a role
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="is-active">Active Status</label>
                            <select id="is-active" name="is_active">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" name="password">
                            <small>Leave blank to keep the current password</small>
                        </div>
                        <div class="form-actions">
                            <button type="button" id="cancel-btn" class="btn btn-outline">Cancel</button>
                            <button type="submit" id="save-btn" class="btn btn-primary">Save User</button>
                        </div>
                    </form>
                </main>
            </div>
        </div>
    </div>

    <script src="/admin/js/theme.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/notification.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/users-edit.js"></script>
</body>
</html>
