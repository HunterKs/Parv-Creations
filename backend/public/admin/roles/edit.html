<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Role - Parv Creations Admin</title>
    <link rel="stylesheet" href="/admin/css/style.css">
    <link rel="stylesheet" href="/admin/css/theme.css">
    <link rel="stylesheet" href="/admin/css/form.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1 class="logo">Parv Creations Admin</h1>
                <nav class="header-nav">
                    <button id="theme-toggle" class="btn-theme">Toggle Theme</button>
                    <div class="user-info">
                        <span id="username">Admin User</span>
                        <button id="logout-btn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </header>

            <div class="dashboard-body">
                <aside class="sidebar">
                    <nav class="sidebar-nav">
                        <ul>
                            <li><a href="/admin/users/" class="nav-link">Users</a></li>
                            <li><a href="/admin/roles/" class="nav-link">Roles</a></li>
                        </ul>
                    </nav>
                </aside>

                <main class="main-content">
                    <div class="page-header">
                        <h2 id="page-title">Edit Role</h2>
                        <a href="/admin/roles/" class="btn btn-secondary btn-back">← Back to Roles</a>
                    </div>

                    <form id="role-form" class="validation-form">
                        <input type="hidden" id="role-id">
                        <div class="form-group">
                            <label for="name">Role Name <span class="required">*</span></label>
                            <input type="text" id="name" name="name" required>
                            <div class="invalid-feedback">
                                Please enter a role name
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="permissions">Permissions <span class="required">*</span></label>
                            <div class="permissions-container">
                                <!-- Permission checkboxes will be populated by JavaScript -->
                            </div>
                            <div class="invalid-feedback">
                                Please select at least one permission
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" id="cancel-btn" class="btn btn-outline">Cancel</button>
                            <button type="submit" id="save-btn" class="btn btn-primary">Save Role</button>
                        </div>
                    </form>
                </main>
            </div>
        </div>
    </div>

    <script src="/admin/js/theme.js"></script>
    <script src="/admin/js/config.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/notification.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/roles-edit.js"></script>
</body>
</html>
